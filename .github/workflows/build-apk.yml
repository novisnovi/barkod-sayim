name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # GitHub Actions sekmesinden manuel tetiklenebilir

permissions:
  contents: write      # release oluşturmak için

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Copy web assets into Android project
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html        android/app/src/main/assets/
          cp manifest.json     android/app/src/main/assets/
          cp sw.js             android/app/src/main/assets/
          cp firebase-config.js android/app/src/main/assets/
          cp icon-192.png      android/app/src/main/assets/
          cp icon-512.png      android/app/src/main/assets/
          ls -la android/app/src/main/assets/

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/barkod-sayim-v${{ github.run_number }}.apk
          ls -la artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: barkod-sayim-apk
          path: artifacts/*.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Barkod Sayım v1.0.${{ github.run_number }}
          body: |
            Otomatik derlenen APK.
            • iData ve diğer Android cihazlara doğrudan yüklenebilir.
            • Bilinmeyen kaynaklardan yüklemeyi açmayı unutmayın.
          files: artifacts/*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
